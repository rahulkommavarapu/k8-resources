#Pod 1  Connect with Pod2 through Selector(Sevice)
kind : Service
apiVersion : v1
metadata : 
  name : nginx-np
spec :
  type : LoadBalancer
  selector : # here Selector acts as Service
    project : expense
    component : backend
    environment : dev
    version : "1.0.0"
    demo : lb
  ports :
  - protocol : TCP
    port : 80 
    targetPort : 80
    nodePort : 30007
---
 # Pod2 Backend 
kind : Pod
apiVersion : v1
metadata :
 name : backend-np
 labels :
   project : expense
   component : backend
   environment : dev 
   version : "1.0.0"
   demo : lb
spec : 
  containers : 
    - name : nginx
      image : nginx 

