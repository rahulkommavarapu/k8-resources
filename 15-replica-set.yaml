apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # These labels are Replicaset Labels
  labels:
    app: frontend
    tier: web
spec:
  # Modify replicas  according tou your  case
  replicas: 3
  selector:
    # Replicaset Use these Labels to find the pods for desired number of replicas
    matchLabels:
      app: frontend
      tier: web
    # Pod template
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
        - name: nginx
          image: nginx
