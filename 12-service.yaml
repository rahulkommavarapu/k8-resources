#Pod 1  Connect with Pod2 through Selector(Sevice)
kind : service
apiVersion : v1
metadata : 
  name : nginx
spec :
  Selector : # here Selector acts as Service
    project : expense
    component : backend
    environment : dev
    version : "1.0.0"
  ports :
  - protocol : TCP
    port : 80 
    targatport : 80
---
 # Pod2 Backend 
kind : Port
apiVersion : v1
metadata :
 name : backend
 labels :
   project : expense
   component : backend
   environment : dev 
   version : "1.0.0"
spec : 
  containers : 
    - name : nginx
      image : nginx 



